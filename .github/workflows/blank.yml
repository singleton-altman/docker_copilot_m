name: Build and Release APK

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      flutter_ref:
        description: Flutter 仓库分支
        required: false
        default: main
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code from main repository
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Checkout code from another repository
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.REPOSITORY }}
          path: ./docker_copilot
          ref: ${{ github.event.inputs.flutter_ref || 'main' }}
          token: ${{ secrets.PERSON_ACCESS_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v1
        with:
          flutter-version: '3.32.8'

      - name: Resolve release name
        id: release_meta
        run: |
          VERSION=$(grep -m1 '^version:' ./docker_copilot/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          RELEASE_NAME="${VERSION}-android-$(date -u +%Y%m%d)"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        run: |
          cd ./docker_copilot
          flutter pub get
          flutter build apk --release

      - name: Create or update GitHub Release
        env:
          TAG: ${{ steps.release_meta.outputs.tag_name }}
          NAME: ${{ steps.release_meta.outputs.release_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          ASSET=./docker_copilot/build/app/outputs/flutter-apk/app-release.apk
          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber -R "$REPO"
            gh release edit "$TAG" --title "$NAME" -R "$REPO"
          else
            gh release create "$TAG" "$ASSET" --title "$NAME" --target "${{ github.sha }}" -R "$REPO"
          fi
